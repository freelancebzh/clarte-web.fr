<!DOCTYPE html>

<body>

<header class="site-header">
  <div class="wrap header-row">
    <p class="brand">VOTRE ENTREPRISE</p>
    <nav>
      <a href="#precommande" class="nav-cta">Réserver</a>
    </nav>
  </div>
</header>

<main class="wrap">
  <section class="intro">
    <h1>VOTRE TRAVAIL, VOTRE SAVOIR FAIRE</h1>
    <p>Activités, prix, produits</p>

  <!-- Exemple de bloc produit "Artisanat" -->
  <section class="card-produit">
    <div class="product-info">
      <h2>Votre Produit</h2>
      <p>Votre description et vos avantages.</p>
      <ul class="product-meta">
        <li><strong>le process</strong> vos règles</li>

        <li><strong>le résultat</strong> ce que vous offrez</li>
      </ul>
      <p class="price"><strong>le prix en €</strong> / le service ou le produit</p>
    </div>
    <div class="product-visual"><span>Photo produit</span></div>
  </section>

  <!-- Tu peux dupliquer la section card-produit pour les autres articles -->
